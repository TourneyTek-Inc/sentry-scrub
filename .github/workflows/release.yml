name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  # Required for npm provenance — lets npm attest that this tarball was
  # built by this workflow from this commit, and shows a verified badge
  # on the package page. Public repos only.
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      # A published version is immutable — npm will not let you re-publish
      # over it. Catch a tag/package.json mismatch BEFORE it becomes a
      # permanent wrong version on the registry.
      - name: verify tag matches package.json
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag v$TAG does not match package.json version $PKG"
            exit 1
          fi
          echo "publishing $(node -p "require('./package.json').name")@$PKG"

      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
