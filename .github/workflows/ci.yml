name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

      # The published entrypoints must actually load, in both module
      # systems. A broken "exports" map typechecks fine and fails at
      # `require()` — which is the first thing a consumer does.
      - name: verify built package is importable
        run: |
          node -e "import('./dist/index.js').then(m => { if (typeof m.scrubSentryEvent !== 'function') throw new Error('ESM entry broken'); console.log('ESM ok'); })"
          node -e "const m = require('./dist/index.cjs'); if (typeof m.scrubSentryEvent !== 'function') throw new Error('CJS entry broken'); console.log('CJS ok');"
